<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <!-- Background: dark navy with subtle gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <g id="petalLight">
      <ellipse cx="80" cy="50" rx="14" ry="8.5" fill="#ffffff"/>
      <circle cx="80" cy="50" r="2.5" fill="#0f172a"/>
    </g>
  </defs>

  <rect width="1128" height="191" fill="url(#bgGradient)"/>

  <!-- Sol Taino mark on left, inverted (white on dark) -->
  <g transform="translate(60 30) scale(1.3)">
    <use href="#petalLight" transform="rotate(0 50 50)"/>
    <use href="#petalLight" transform="rotate(45 50 50)"/>
    <use href="#petalLight" transform="rotate(90 50 50)"/>
    <use href="#petalLight" transform="rotate(135 50 50)"/>
    <use href="#petalLight" transform="rotate(180 50 50)"/>
    <use href="#petalLight" transform="rotate(225 50 50)"/>
    <use href="#petalLight" transform="rotate(270 50 50)"/>
    <use href="#petalLight" transform="rotate(315 50 50)"/>

    <circle cx="50" cy="50" r="22" fill="#ffffff"/>

    <g transform="translate(50 50) scale(0.55) translate(-33 -35)">
      <path d="M19 16h17.5c5.8 0 10.4 3.6 10.4 9.2 0 3.4-1.7 6-4.4 7.4 3.7 1.3 6 4.3 6 8.4 0 6.2-4.9 9.8-11.4 9.8H19V16zm8 13.6h8.4c2.8 0 4.6-1.4 4.6-3.7 0-2.4-1.8-3.7-4.6-3.7H27v7.4zm0 14.4h9.6c3 0 5-1.5 5-4.1 0-2.5-2-4-5-4H27v8.1z" fill="#0f172a"/>
    </g>
  </g>

  <!-- Wordmark + tagline + URL on the right of the mark -->
  <text x="240" y="78" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1">Boriken AI Consulting</text>

  <text x="240" y="115" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1">Cybersecurity assessments for small businesses · NY/NJ tri-state</text>

  <text x="240" y="148" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#3b82f6" letter-spacing="0.5">borikenaiconsulting.com</text>
</svg>
