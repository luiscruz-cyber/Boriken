<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <defs>
    <g id="petal">
      <ellipse cx="80" cy="50" rx="14" ry="8.5" fill="#0f172a"/>
      <circle cx="80" cy="50" r="2.5" fill="#ffffff"/>
    </g>
  </defs>

  <!-- 8 petals around the center -->
  <use href="#petal" transform="rotate(0 50 50)"/>
  <use href="#petal" transform="rotate(45 50 50)"/>
  <use href="#petal" transform="rotate(90 50 50)"/>
  <use href="#petal" transform="rotate(135 50 50)"/>
  <use href="#petal" transform="rotate(180 50 50)"/>
  <use href="#petal" transform="rotate(225 50 50)"/>
  <use href="#petal" transform="rotate(270 50 50)"/>
  <use href="#petal" transform="rotate(315 50 50)"/>

  <!-- Central disc -->
  <circle cx="50" cy="50" r="22" fill="#0f172a"/>

  <!-- B inside central disc -->
  <g transform="translate(50 50) scale(0.55) translate(-33 -35)">
    <path d="M19 16h17.5c5.8 0 10.4 3.6 10.4 9.2 0 3.4-1.7 6-4.4 7.4 3.7 1.3 6 4.3 6 8.4 0 6.2-4.9 9.8-11.4 9.8H19V16zm8 13.6h8.4c2.8 0 4.6-1.4 4.6-3.7 0-2.4-1.8-3.7-4.6-3.7H27v7.4zm0 14.4h9.6c3 0 5-1.5 5-4.1 0-2.5-2-4-5-4H27v8.1z" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="55" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#0f172a" letter-spacing="-0.5">Boriken</text>
  <text x="120" y="78" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="2">AI CONSULTING</text>
</svg>
